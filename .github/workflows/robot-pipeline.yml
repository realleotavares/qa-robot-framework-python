name: Robot Framework Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Node.js (Required for Browser library)
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Initialize Robot Framework Browser
      run: rfbrowser init
        
    - name: Run Robot Tests
      run: robot -d results tests/
      
    - name: Upload Robot Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: robot-framework-reports
        path: results/
        retention-days: 15
